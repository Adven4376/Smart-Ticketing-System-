spring.application.name=Ticketing-System

#Server Port
server.port= ${SERVER_PORT:7777}

#DB config
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver
spring.datasource.url = ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/projects}
spring.datasource.username = ${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password = ${SPRING_DATASOURCE_PASSWORD:root}

#jpa config
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
#new---------
spring.jpa.properties.hibernate.format_sql=true 


#Virtual Threads (The Java 25 Power Feature) #new-------
spring.threads.virtual.enabled=true

#Enable Optimistic Locking Logging #new---------
logging.level.org.hibernate.orm.jdbc.bind=TRACE

#new----------
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10
